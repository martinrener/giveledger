[www]
user  = www-data
group = www-data

listen = 9000

; Dynamic pool — scales between min/max based on demand.
; max_children must be high enough to absorb concurrent SSE connections
; (each open SSE tab holds one worker for the lifetime of the connection).
pm                   = dynamic
pm.max_children      = 50
pm.start_servers     = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 20
