events {}

http {
    # Use Docker's internal DNS — resolves upstreams at request time, not startup
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;

        # API requests → PHP-FPM via FastCGI (all routes handled by index.php)
        location /api/ {
            fastcgi_pass php-fpm:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /app/public/index.php;
            fastcgi_param REQUEST_URI $request_uri;

            # Required for SSE — disables nginx response buffering
            fastcgi_buffering off;
            # Required for SSE — keeps long-lived connections alive
            fastcgi_read_timeout 3600;
        }

        # Everything else → Nuxt dev server
        location / {
            set $vue http://vue:3000;
            proxy_pass $vue;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Required for Nuxt HMR websocket in dev
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
