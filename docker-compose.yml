services:
  nginx:
    build: ./docker/nginx
    ports:
      - "80:80"
    depends_on:
      - php-fpm
      - vue
    networks:
      - app

  php-fpm:
    build: ./docker/php
    volumes:
      - ./app:/app/app
      - ./config:/app/config
      - ./db:/app/db
      - ./public:/app/public
    environment:
      DB_HOST: mysql
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      APP_ENV: ${APP_ENV}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app

  vue:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
    environment:
      NUXT_PUBLIC_API_BASE: /api
    networks:
      - app

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app

volumes:
  mysql_data:

networks:
  app:
